<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Vavan Beta Sales Map</title>

  <link href="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.css" rel="stylesheet" />
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * { box-sizing:border-box; }
    html, body { margin:0; height:100%; font-family:Inter,Arial,sans-serif; background:#0f1115; color:#fff; }
    button, input, textarea, select { font:inherit; }
    a { color:inherit; }

    :root{
      --bg:#0f1115;
      --panel:#171a21;
      --panel2:#1f2430;
      --muted:#98a2b3;
      --line:#2a3140;
      --accent:#6c5ce7;
      --good:#12b76a;
      --warn:#f59e0b;
      --bad:#ef4444;
      --headerH:56px;
      --leftW:360px;
      --rightW:360px;
    }

    #app { display:none; height:100%; }
    #app.ready { display:block; }

    #loginScreen, #loadingScreen {
      position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
      background:#0b0d12; z-index:9999;
    }

    .card {
      width:min(420px,92vw);
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:16px;
      padding:24px;
      box-shadow:0 20px 80px rgba(0,0,0,.45);
    }

    .brand {
      font-size:28px; font-weight:800; letter-spacing:-.02em; margin-bottom:6px;
    }

    .sub {
      color:var(--muted); font-size:14px; margin-bottom:20px;
    }

    .field { margin-bottom:12px; }
    .label { display:block; margin-bottom:6px; font-size:13px; color:#d0d5dd; }
    .input, .textarea, .select {
      width:100%; background:#0f1115; color:#fff; border:1px solid var(--line);
      border-radius:10px; padding:12px;
    }
    .textarea { min-height:90px; resize:vertical; }

    .btn {
      border:none; border-radius:10px; padding:12px 14px; cursor:pointer;
      background:var(--accent); color:#fff; font-weight:600;
    }
    .btn.secondary {
      background:#222938; border:1px solid var(--line); color:#fff;
    }
    .btn.ghost {
      background:transparent; border:1px solid var(--line); color:#fff;
    }
    .btn.good { background:var(--good); }
    .btn.warn { background:var(--warn); color:#111; }
    .btn.bad { background:var(--bad); }

    .row { display:flex; gap:10px; }
    .row > * { flex:1; }

    #topbar {
      position:fixed; top:0; left:0; right:0; height:var(--headerH);
      background:#0d1016; border-bottom:1px solid var(--line); z-index:1000;
      display:flex; align-items:center; gap:10px; padding:0 12px;
    }

    #logo { font-weight:800; font-size:20px; }
    #territoryBadge, #countBadge, #syncBadge {
      border:1px solid var(--line); background:#151925; color:#d0d5dd;
      padding:8px 10px; border-radius:999px; font-size:12px;
      white-space:nowrap;
    }

    #searchWrap {
      flex:1; display:flex; align-items:center; gap:8px; min-width:0;
    }
    #searchInput {
      width:100%; min-width:120px; background:#151925; color:#fff;
      border:1px solid var(--line); border-radius:999px; padding:10px 14px;
    }

    #map {
      position:fixed; top:var(--headerH); left:0; right:0; bottom:0;
    }

    #leftPanel, #rightPanel {
      position:fixed; top:var(--headerH); bottom:0; background:var(--panel);
      border-right:1px solid var(--line); z-index:900; overflow:hidden;
      display:flex; flex-direction:column;
    }

    #leftPanel {
      left:0; width:var(--leftW);
    }

    #rightPanel {
      right:0; width:var(--rightW); border-right:none; border-left:1px solid var(--line);
      transform:translateX(100%);
      transition:transform .22s ease;
    }
    #rightPanel.open { transform:translateX(0); }

    .panelHead {
      padding:14px 14px 10px; border-bottom:1px solid var(--line);
      display:flex; align-items:center; justify-content:space-between; gap:10px;
    }
    .panelTitle { font-size:15px; font-weight:700; }
    .panelBody { flex:1; overflow:auto; }

    .filters {
      padding:12px; border-bottom:1px solid var(--line);
      display:flex; flex-direction:column; gap:10px;
    }

    .pillRow { display:flex; flex-wrap:wrap; gap:8px; }
    .pill {
      padding:8px 10px; border-radius:999px; border:1px solid var(--line);
      background:#141926; color:#d0d5dd; cursor:pointer; font-size:12px;
    }
    .pill.active { background:var(--accent); border-color:var(--accent); color:#fff; }

    #results {
      padding:0; margin:0; list-style:none;
    }

    .item {
      padding:12px; border-bottom:1px solid var(--line); cursor:pointer;
      background:transparent;
    }
    .item:hover { background:#1b2030; }
    .itemName { font-weight:700; font-size:14px; margin-bottom:4px; }
    .itemMeta { color:var(--muted); font-size:12px; line-height:1.45; }
    .tag {
      display:inline-block; padding:4px 8px; border-radius:999px; font-size:11px;
      background:#20283a; color:#d0d5dd; margin-right:6px; margin-top:6px;
    }
    .tag.good { background:rgba(18,183,106,.14); color:#6ce9a6; }
    .tag.warn { background:rgba(245,158,11,.14); color:#f7c56a; }
    .tag.bad { background:rgba(239,68,68,.14); color:#ff9b9b; }

    .detailSection {
      padding:14px; border-bottom:1px solid var(--line);
    }
    .detailName { font-size:20px; font-weight:800; margin-bottom:4px; }
    .detailMeta { color:var(--muted); font-size:13px; line-height:1.5; }

    .actionGrid {
      display:grid; grid-template-columns:1fr 1fr; gap:10px;
    }

    .small { font-size:12px; color:var(--muted); }
    .muted { color:var(--muted); }
    .error { color:#ff6b6b; font-size:13px; margin-top:10px; }

    #fabBar {
      display:none;
      position:fixed; left:12px; right:12px; bottom:12px; z-index:1100;
      gap:10px;
    }

    #fabBar .btn { flex:1; }

    .closeX {
      width:34px; height:34px; border-radius:999px; border:1px solid var(--line);
      background:#20283a; color:#fff; cursor:pointer;
    }

    @media (max-width: 900px) {
      #leftPanel {
        width:100%; transform:translateY(0);
      }
      #rightPanel {
        width:100%;
      }
      #territoryBadge, #syncBadge { display:none; }
      #fabBar { display:flex; }
    }
  </style>
</head>
<body>

  <div id="loadingScreen">
    <div class="card">
      <div class="brand">Vavan Beta</div>
      <div class="sub" id="loadingText">Loading sales map...</div>
    </div>
  </div>

  <div id="loginScreen" style="display:none;">
    <div class="card">
      <div class="brand">Vavan Beta</div>
      <div class="sub">Sales blitz field map</div>

      <div class="field">
        <label class="label">Email</label>
        <input class="input" id="loginEmail" type="email" placeholder="you@company.com">
      </div>

      <div class="field">
        <label class="label">Password</label>
        <input class="input" id="loginPassword" type="password" placeholder="••••••••">
      </div>

      <button class="btn" id="loginBtn" style="width:100%;">Sign in</button>
      <div class="error" id="loginError"></div>
    </div>
  </div>

  <div id="app">
    <div id="topbar">
      <div id="logo">Vavan</div>
      <div id="territoryBadge">Territory: --</div>
      <div id="countBadge">0 businesses</div>
      <div id="syncBadge">Ready</div>

      <div id="searchWrap">
        <input id="searchInput" placeholder="Search business, street, city, phone..." />
      </div>

      <button class="btn secondary" id="addBusinessBtn">Add Business</button>
      <button class="btn ghost" id="signOutBtn">Sign out</button>
    </div>

    <div id="map"></div>

    <aside id="leftPanel">
      <div class="panelHead">
        <div class="panelTitle">Businesses</div>
        <button class="btn ghost" id="refreshBtn" style="padding:8px 10px;">Refresh</button>
      </div>

      <div class="filters">
        <div class="row">
          <select class="select" id="visitedFilter">
            <option value="all">All</option>
            <option value="not_visited">Not Visited</option>
            <option value="visited">Visited</option>
          </select>

          <select class="select" id="statusFilter">
            <option value="all">All Status</option>
            <option value="new">New</option>
            <option value="attempted">Attempted</option>
            <option value="talked_to">Talked To</option>
            <option value="qualified">Qualified</option>
            <option value="follow_up">Follow Up</option>
          </select>
        </div>

        <div class="pillRow" id="quickFilterRow">
          <button class="pill active" data-filter="all">All</button>
          <button class="pill" data-filter="has_phone">Has Phone</button>
          <button class="pill" data-filter="has_website">Has Website</button>
          <button class="pill" data-filter="unassigned">No Notes</button>
        </div>
      </div>

      <div class="panelBody">
        <ul id="results"></ul>
      </div>
    </aside>

    <aside id="rightPanel">
      <div class="panelHead">
        <div class="panelTitle">Business Detail</div>
        <button class="closeX" id="closeDetailBtn">✕</button>
      </div>
      <div class="panelBody" id="detailBody"></div>
    </aside>

    <div id="fabBar">
      <button class="btn secondary" id="fabListBtn">List</button>
      <button class="btn" id="fabAddBtn">Add</button>
    </div>
  </div>

  <script>
    // =========================
    // CONFIG
    // =========================
    const SUPABASE_URL = "YOUR_SUPABASE_URL";
    const SUPABASE_ANON_KEY = "YOUR_SUPABASE_ANON_KEY";
    const MAPBOX_TOKEN = "YOUR_MAPBOX_TOKEN";

    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    mapboxgl.accessToken = MAPBOX_TOKEN;

    // =========================
    // STATE
    // =========================
    let map;
    let allBusinesses = [];
    let visibleBusinesses = [];
    let selectedBusiness = null;
    let currentUser = null;
    let currentProfile = null;
    let quickFilter = "all";

    const state = {
      mapLoaded: false,
      sourceLoaded: false
    };

    // =========================
    // DOM
    // =========================
    const loadingScreen = document.getElementById("loadingScreen");
    const loadingText = document.getElementById("loadingText");
    const loginScreen = document.getElementById("loginScreen");
    const app = document.getElementById("app");

    const loginEmail = document.getElementById("loginEmail");
    const loginPassword = document.getElementById("loginPassword");
    const loginBtn = document.getElementById("loginBtn");
    const loginError = document.getElementById("loginError");

    const territoryBadge = document.getElementById("territoryBadge");
    const countBadge = document.getElementById("countBadge");
    const syncBadge = document.getElementById("syncBadge");
    const searchInput = document.getElementById("searchInput");
    const refreshBtn = document.getElementById("refreshBtn");
    const signOutBtn = document.getElementById("signOutBtn");
    const addBusinessBtn = document.getElementById("addBusinessBtn");
    const resultsEl = document.getElementById("results");
    const detailBody = document.getElementById("detailBody");
    const rightPanel = document.getElementById("rightPanel");
    const closeDetailBtn = document.getElementById("closeDetailBtn");
    const visitedFilter = document.getElementById("visitedFilter");
    const statusFilter = document.getElementById("statusFilter");
    const quickFilterRow = document.getElementById("quickFilterRow");
    const fabAddBtn = document.getElementById("fabAddBtn");
    const fabListBtn = document.getElementById("fabListBtn");

    // =========================
    // HELPERS
    // =========================
    function setLoading(msg) {
      loadingText.textContent = msg;
    }

    function setSync(msg, good = false) {
      syncBadge.textContent = msg;
      syncBadge.style.color = good ? "#6ce9a6" : "#d0d5dd";
    }

    function escapeHtml(value) {
      if (value == null) return "";
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function getPhoneHref(phone) {
      return "tel:" + String(phone || "").replace(/\D/g, "");
    }

    function getGoogleMapsLink(b) {
      const q = encodeURIComponent([b.name, b.street, b.city, b.state, b.zip].filter(Boolean).join(", "));
      return "https://www.google.com/maps/search/?api=1&query=" + q;
    }

    function getDirectionsLink(b) {
      const q = encodeURIComponent([b.street, b.city, b.state, b.zip].filter(Boolean).join(", "));
      return "https://www.google.com/maps/dir/?api=1&destination=" + q;
    }

    function normalizeText(v) {
      return String(v || "").toLowerCase().trim();
    }

    function businessColor(b) {
      if (b.visited) return "#12b76a";
      if (b.status === "qualified") return "#f59e0b";
      if (b.status === "talked_to") return "#38bdf8";
      if (b.status === "follow_up") return "#a78bfa";
      if (b.status === "attempted") return "#ef4444";
      return "#6c5ce7";
    }

    function statusTag(status) {
      if (!status || status === "new") return '<span class="tag">New</span>';
      if (status === "attempted") return '<span class="tag bad">Attempted</span>';
      if (status === "talked_to") return '<span class="tag">Talked To</span>';
      if (status === "qualified") return '<span class="tag warn">Qualified</span>';
      if (status === "follow_up") return '<span class="tag good">Follow Up</span>';
      return '<span class="tag">' + escapeHtml(status) + '</span>';
    }

    function visitedTag(v) {
      return v ? '<span class="tag good">Visited</span>' : '<span class="tag">Not Visited</span>';
    }

    function territoryNameFromProfile(profile) {
      if (!profile) return "Unknown";
      return profile.territory_name || profile.territory_code || "Territory";
    }

    function isInsideUserTerritory(b) {
      if (!currentProfile) return false;

      // Beta territory logic:
      // easiest path is filtering by assigned territory_code on each business
      if (currentProfile.territory_code && b.territory_code) {
        return b.territory_code === currentProfile.territory_code;
      }

      // fallback: zip match if profile has allowed_zips array
      if (Array.isArray(currentProfile.allowed_zips) && currentProfile.allowed_zips.length) {
        return currentProfile.allowed_zips.includes(b.zip);
      }

      return false;
    }

    function filteredBusinesses() {
      const q = normalizeText(searchInput.value);
      const visitedVal = visitedFilter.value;
      const statusVal = statusFilter.value;

      return allBusinesses.filter(b => {
        if (!isInsideUserTerritory(b)) return false;

        if (visitedVal === "visited" && !b.visited) return false;
        if (visitedVal === "not_visited" && b.visited) return false;

        if (statusVal !== "all" && (b.status || "new") !== statusVal) return false;

        if (quickFilter === "has_phone" && !b.phone) return false;
        if (quickFilter === "has_website" && !b.website) return false;
        if (quickFilter === "unassigned" && normalizeText(b.notes)) return false;

        if (q) {
          const haystack = [
            b.name, b.street, b.city, b.state, b.zip, b.phone, b.website, b.notes
          ].map(normalizeText).join(" ");
          if (!haystack.includes(q)) return false;
        }

        return true;
      });
    }

    // =========================
    // MAP
    // =========================
    function initMap() {
      map = new mapboxgl.Map({
        container: "map",
        style: "mapbox://styles/mapbox/dark-v11",
        center: [-115.1398, 36.1699],
        zoom: 10.8
      });

      map.addControl(new mapboxgl.NavigationControl(), "top-right");

      map.on("load", () => {
        state.mapLoaded = true;

        map.addSource("businesses", {
          type: "geojson",
          data: { type: "FeatureCollection", features: [] },
          cluster: true,
          clusterMaxZoom: 14,
          clusterRadius: 45
        });

        map.addLayer({
          id: "clusters",
          type: "circle",
          source: "businesses",
          filter: ["has", "point_count"],
          paint: {
            "circle-color": "#6c5ce7",
            "circle-radius": [
              "step",
              ["get", "point_count"],
              18,
              25, 24,
              100, 30
            ],
            "circle-opacity": 0.85
          }
        });

        map.addLayer({
          id: "cluster-count",
          type: "symbol",
          source: "businesses",
          filter: ["has", "point_count"],
          layout: {
            "text-field": "{point_count_abbreviated}",
            "text-size": 12
          },
          paint: {
            "text-color": "#ffffff"
          }
        });

        map.addLayer({
          id: "points",
          type: "circle",
          source: "businesses",
          filter: ["!", ["has", "point_count"]],
          paint: {
            "circle-radius": 7,
            "circle-color": ["get", "color"],
            "circle-stroke-width": 2,
            "circle-stroke-color": "#ffffff",
            "circle-opacity": 0.95
          }
        });

        map.addLayer({
          id: "selected-point",
          type: "circle",
          source: "businesses",
          filter: ["==", ["get", "id"], ""],
          paint: {
            "circle-radius": 13,
            "circle-color": ["get", "color"],
            "circle-stroke-width": 3,
            "circle-stroke-color": "#f8fafc",
            "circle-opacity": 1
          }
        });

        map.on("click", "clusters", async (e) => {
          const features = map.queryRenderedFeatures(e.point, { layers: ["clusters"] });
          const clusterId = features[0].properties.cluster_id;
          const zoom = await map.getSource("businesses").getClusterExpansionZoom(clusterId);
          map.easeTo({ center: features[0].geometry.coordinates, zoom });
        });

        map.on("click", "points", (e) => {
          const feature = e.features[0];
          const id = feature.properties.id;
          const business = allBusinesses.find(x => String(x.id) === String(id));
          if (business) openBusinessDetail(business);
        });

        map.on("mouseenter", "points", () => map.getCanvas().style.cursor = "pointer");
        map.on("mouseleave", "points", () => map.getCanvas().style.cursor = "");
        map.on("mouseenter", "clusters", () => map.getCanvas().style.cursor = "pointer");
        map.on("mouseleave", "clusters", () => map.getCanvas().style.cursor = "");

        state.sourceLoaded = true;
        refreshMap();
      });
    }

    function refreshMap() {
      if (!state.mapLoaded || !state.sourceLoaded) return;

      visibleBusinesses = filteredBusinesses();

      const features = visibleBusinesses
        .filter(b => b.lat != null && b.lng != null)
        .map(b => ({
          type: "Feature",
          geometry: {
            type: "Point",
            coordinates: [Number(b.lng), Number(b.lat)]
          },
          properties: {
            id: String(b.id),
            name: b.name || "",
            color: businessColor(b)
          }
        }));

      map.getSource("businesses").setData({
        type: "FeatureCollection",
        features
      });

      if (selectedBusiness) {
        map.setFilter("selected-point", ["==", ["get", "id"], String(selectedBusiness.id)]);
      } else {
        map.setFilter("selected-point", ["==", ["get", "id"], ""]);
      }

      renderList();
      countBadge.textContent = `${visibleBusinesses.length} businesses`;
    }

    function flyToBusiness(b) {
      if (!b?.lat || !b?.lng) return;
      map.flyTo({
        center: [Number(b.lng), Number(b.lat)],
        zoom: 15.3,
        speed: 1.2
      });
    }

    // =========================
    // LIST + DETAIL
    // =========================
    function renderList() {
      if (!visibleBusinesses.length) {
        resultsEl.innerHTML = `<li class="item"><div class="itemMeta">No businesses matched your filters.</div></li>`;
        return;
      }

      resultsEl.innerHTML = visibleBusinesses.map(b => `
        <li class="item" data-id="${escapeHtml(b.id)}">
          <div class="itemName">${escapeHtml(b.name || "Unnamed Business")}</div>
          <div class="itemMeta">
            ${escapeHtml([b.street, b.city, b.state, b.zip].filter(Boolean).join(", ")) || "No address"}
            <br>
            ${escapeHtml(b.phone || "No phone")}
          </div>
          <div>
            ${visitedTag(!!b.visited)}
            ${statusTag(b.status || "new")}
          </div>
        </li>
      `).join("");

      resultsEl.querySelectorAll(".item").forEach(el => {
        el.addEventListener("click", () => {
          const business = allBusinesses.find(x => String(x.id) === el.dataset.id);
          if (business) openBusinessDetail(business);
        });
      });
    }

    function openBusinessDetail(b) {
      selectedBusiness = b;
      flyToBusiness(b);
      refreshMap();

      rightPanel.classList.add("open");
      detailBody.innerHTML = `
        <div class="detailSection">
          <div class="detailName">${escapeHtml(b.name || "Unnamed Business")}</div>
          <div class="detailMeta">
            ${escapeHtml([b.street, b.city, b.state, b.zip].filter(Boolean).join(", ")) || "No address"}
            <br>
            ${escapeHtml(b.phone || "No phone")} ${b.website ? " • " + escapeHtml(b.website) : ""}
          </div>
          <div style="margin-top:10px;">
            ${visitedTag(!!b.visited)}
            ${statusTag(b.status || "new")}
          </div>
        </div>

        <div class="detailSection">
          <div class="actionGrid">
            <a class="btn secondary" href="${b.phone ? getPhoneHref(b.phone) : '#'}" ${b.phone ? "" : 'style="pointer-events:none;opacity:.45;"'}>Call</a>
            <a class="btn secondary" href="${b.website || '#'}" target="_blank" ${b.website ? "" : 'style="pointer-events:none;opacity:.45;"'}>Website</a>
            <a class="btn secondary" href="${getDirectionsLink(b)}" target="_blank">Navigate</a>
            <button class="btn ${b.visited ? "good" : "secondary"}" id="toggleVisitedBtn">${b.visited ? "Visited" : "Mark Visited"}</button>
          </div>
        </div>

        <div class="detailSection">
          <div class="field">
            <label class="label">Status</label>
            <select class="select" id="detailStatus">
              <option value="new" ${b.status === "new" || !b.status ? "selected" : ""}>New</option>
              <option value="attempted" ${b.status === "attempted" ? "selected" : ""}>Attempted</option>
              <option value="talked_to" ${b.status === "talked_to" ? "selected" : ""}>Talked To</option>
              <option value="qualified" ${b.status === "qualified" ? "selected" : ""}>Qualified</option>
              <option value="follow_up" ${b.status === "follow_up" ? "selected" : ""}>Follow Up</option>
            </select>
          </div>

          <div class="field">
            <label class="label">Notes</label>
            <textarea class="textarea" id="detailNotes" placeholder="Enter visit notes, what they use, who you talked to, follow-up info...">${escapeHtml(b.notes || "")}</textarea>
          </div>

          <div class="row">
            <button class="btn" id="saveDetailBtn">Save</button>
            <button class="btn secondary" id="editBusinessBtn">Edit Business</button>
          </div>
        </div>
      `;

      document.getElementById("toggleVisitedBtn").onclick = async () => {
        await updateBusiness(b.id, { visited: !b.visited });
      };

      document.getElementById("saveDetailBtn").onclick = async () => {
        const status = document.getElementById("detailStatus").value;
        const notes = document.getElementById("detailNotes").value;
        await updateBusiness(b.id, { status, notes });
      };

      document.getElementById("editBusinessBtn").onclick = () => {
        openAddEditModal("edit", b);
      };
    }

    function closeBusinessDetail() {
      selectedBusiness = null;
      rightPanel.classList.remove("open");
      refreshMap();
    }

    // =========================
    // DATA
    // =========================
    async function loadProfile() {
      const { data, error } = await sb
        .from("sales_profiles")
        .select("*")
        .eq("user_id", currentUser.id)
        .single();

      if (error) throw error;
      currentProfile = data;
      territoryBadge.textContent = `Territory: ${territoryNameFromProfile(currentProfile)}`;
    }

    async function loadBusinesses() {
      setSync("Loading...");
      const { data, error } = await sb
        .from("businesses")
        .select("*")
        .eq("market", "Las Vegas")
        .order("name", { ascending: true });

      if (error) throw error;
      allBusinesses = data || [];
      setSync("Synced", true);
      refreshMap();
    }

    async function updateBusiness(id, patch) {
      try {
        setSync("Saving...");
        const { error } = await sb
          .from("businesses")
          .update({
            ...patch,
            updated_at: new Date().toISOString(),
            updated_by: currentUser.id
          })
          .eq("id", id);

        if (error) throw error;

        const idx = allBusinesses.findIndex(x => String(x.id) === String(id));
        if (idx > -1) {
          allBusinesses[idx] = { ...allBusinesses[idx], ...patch };
          if (selectedBusiness && String(selectedBusiness.id) === String(id)) {
            selectedBusiness = { ...selectedBusiness, ...patch };
            openBusinessDetail(selectedBusiness);
          }
        }

        refreshMap();
        setSync("Saved", true);
      } catch (err) {
        console.error(err);
        alert("Save failed: " + err.message);
        setSync("Save failed");
      }
    }

    async function addBusiness(payload) {
      try {
        setSync("Adding...");
        const { data, error } = await sb
          .from("businesses")
          .insert([{
            ...payload,
            market: "Las Vegas",
            territory_code: currentProfile.territory_code,
            created_by: currentUser.id,
            updated_by: currentUser.id
          }])
          .select()
          .single();

        if (error) throw error;

        allBusinesses.unshift(data);
        refreshMap();
        setSync("Added", true);

        if (data.lat && data.lng) {
          map.flyTo({ center:[Number(data.lng), Number(data.lat)], zoom:15.3, speed:1.2 });
        }

        openBusinessDetail(data);
      } catch (err) {
        console.error(err);
        alert("Add business failed: " + err.message);
        setSync("Add failed");
      }
    }

    async function editBusiness(id, payload) {
      try {
        setSync("Updating...");
        const { data, error } = await sb
          .from("businesses")
          .update({
            ...payload,
            updated_at: new Date().toISOString(),
            updated_by: currentUser.id
          })
          .eq("id", id)
          .select()
          .single();

        if (error) throw error;

        const idx = allBusinesses.findIndex(x => String(x.id) === String(id));
        if (idx > -1) allBusinesses[idx] = data;
        selectedBusiness = data;

        refreshMap();
        openBusinessDetail(data);
        setSync("Updated", true);
      } catch (err) {
        console.error(err);
        alert("Update business failed: " + err.message);
        setSync("Update failed");
      }
    }

    // =========================
    // GEOCODING
    // =========================
    async function geocodeAddress(address) {
      const url =
        "https://api.mapbox.com/geocoding/v5/mapbox.places/" +
        encodeURIComponent(address) +
        ".json?limit=1&access_token=" +
        MAPBOX_TOKEN;

      const res = await fetch(url);
      if (!res.ok) throw new Error("Geocode request failed");
      const json = await res.json();

      if (!json.features?.length) {
        throw new Error("Could not geocode address");
      }

      const f = json.features[0];
      return {
        lng: f.center[0],
        lat: f.center[1]
      };
    }

    // =========================
    // MODAL
    // =========================
    function openAddEditModal(mode, business = null) {
      const isEdit = mode === "edit";
      const modal = document.createElement("div");
      modal.style.cssText = `
        position:fixed; inset:0; background:rgba(0,0,0,.65); z-index:1200;
        display:flex; align-items:center; justify-content:center; padding:18px;
      `;

      modal.innerHTML = `
        <div class="card" style="max-height:92vh; overflow:auto; width:min(560px,96vw);">
          <div class="brand" style="font-size:22px;">${isEdit ? "Edit Business" : "Add Business"}</div>
          <div class="sub">${isEdit ? "Update business info in the field." : "Add a new business and pin it to the map."}</div>

          <div class="field">
            <label class="label">Business Name</label>
            <input class="input" id="m_name" value="${escapeHtml(business?.name || "")}">
          </div>

          <div class="row">
            <div class="field">
              <label class="label">Phone</label>
              <input class="input" id="m_phone" value="${escapeHtml(business?.phone || "")}">
            </div>
            <div class="field">
              <label class="label">Website</label>
              <input class="input" id="m_website" value="${escapeHtml(business?.website || "")}">
            </div>
          </div>

          <div class="field">
            <label class="label">Street</label>
            <input class="input" id="m_street" value="${escapeHtml(business?.street || "")}">
          </div>

          <div class="row">
            <div class="field">
              <label class="label">City</label>
              <input class="input" id="m_city" value="${escapeHtml(business?.city || "Las Vegas")}">
            </div>
            <div class="field">
              <label class="label">State</label>
              <input class="input" id="m_state" value="${escapeHtml(business?.state || "NV")}">
            </div>
            <div class="field">
              <label class="label">Zip</label>
              <input class="input" id="m_zip" value="${escapeHtml(business?.zip || "")}">
            </div>
          </div>

          <div class="field">
            <label class="label">Status</label>
            <select class="select" id="m_status">
              <option value="new" ${(business?.status || "new") === "new" ? "selected" : ""}>New</option>
              <option value="attempted" ${business?.status === "attempted" ? "selected" : ""}>Attempted</option>
              <option value="talked_to" ${business?.status === "talked_to" ? "selected" : ""}>Talked To</option>
              <option value="qualified" ${business?.status === "qualified" ? "selected" : ""}>Qualified</option>
              <option value="follow_up" ${business?.status === "follow_up" ? "selected" : ""}>Follow Up</option>
            </select>
          </div>

          <div class="field">
            <label class="label">Notes</label>
            <textarea class="textarea" id="m_notes">${escapeHtml(business?.notes || "")}</textarea>
          </div>

          <div class="row">
            <button class="btn secondary" id="m_cancel">Cancel</button>
            <button class="btn" id="m_save">${isEdit ? "Update Business" : "Add Business"}</button>
          </div>
        </div>
      `;

      document.body.appendChild(modal);

      modal.querySelector("#m_cancel").onclick = () => modal.remove();

      modal.querySelector("#m_save").onclick = async () => {
        try {
          const payload = {
            name: modal.querySelector("#m_name").value.trim(),
            phone: modal.querySelector("#m_phone").value.trim() || null,
            website: modal.querySelector("#m_website").value.trim() || null,
            street: modal.querySelector("#m_street").value.trim(),
            city: modal.querySelector("#m_city").value.trim(),
            state: modal.querySelector("#m_state").value.trim(),
            zip: modal.querySelector("#m_zip").value.trim(),
            status: modal.querySelector("#m_status").value,
            notes: modal.querySelector("#m_notes").value.trim() || null
          };

          if (!payload.name) throw new Error("Business name is required");
          if (!payload.street || !payload.city || !payload.state) {
            throw new Error("Street, city, and state are required");
          }

          const fullAddress = [payload.street, payload.city, payload.state, payload.zip].filter(Boolean).join(", ");
          const coords = await geocodeAddress(fullAddress);

          payload.lat = coords.lat;
          payload.lng = coords.lng;
          payload.visited = business?.visited || false;

          modal.querySelector("#m_save").disabled = true;
          modal.querySelector("#m_save").textContent = isEdit ? "Updating..." : "Adding...";

          if (isEdit) {
            await editBusiness(business.id, payload);
          } else {
            await addBusiness(payload);
          }

          modal.remove();
        } catch (err) {
          alert(err.message);
        }
      };
    }

    // =========================
    // AUTH + APP START
    // =========================
    async function showLogin() {
      loadingScreen.style.display = "none";
      loginScreen.style.display = "flex";
    }

    async function startApp(sessionUser) {
      try {
        currentUser = sessionUser;
        setLoading("Loading map...");
        loadingScreen.style.display = "flex";
        loginScreen.style.display = "none";

        if (!map) initMap();

        await loadProfile();
        await loadBusinesses();

        app.classList.add("ready");
        loadingScreen.style.display = "none";
      } catch (err) {
        console.error(err);
        alert("Startup failed: " + err.message);
        await showLogin();
      }
    }

    async function boot() {
      try {
        const { data: { session } } = await sb.auth.getSession();
        if (session?.user) {
          await startApp(session.user);
        } else {
          await showLogin();
        }
      } catch (err) {
        console.error(err);
        await showLogin();
      }
    }

    // =========================
    // EVENTS
    // =========================
    loginBtn.onclick = async () => {
      loginError.textContent = "";
      try {
        const email = loginEmail.value.trim();
        const password = loginPassword.value;
        if (!email || !password) throw new Error("Enter email and password");

        loginBtn.disabled = true;
        loginBtn.textContent = "Signing in...";

        const { data, error } = await sb.auth.signInWithPassword({ email, password });
        if (error) throw error;

        await startApp(data.user);
      } catch (err) {
        loginError.textContent = err.message;
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = "Sign in";
      }
    };

    loginPassword.addEventListener("keydown", (e) => {
      if (e.key === "Enter") loginBtn.click();
    });

    signOutBtn.onclick = async () => {
      await sb.auth.signOut();
      location.reload();
    };

    refreshBtn.onclick = async () => {
      await loadBusinesses();
    };

    searchInput.addEventListener("input", refreshMap);
    visitedFilter.addEventListener("change", refreshMap);
    statusFilter.addEventListener("change", refreshMap);

    quickFilterRow.querySelectorAll(".pill").forEach(btn => {
      btn.addEventListener("click", () => {
        quickFilterRow.querySelectorAll(".pill").forEach(x => x.classList.remove("active"));
        btn.classList.add("active");
        quickFilter = btn.dataset.filter;
        refreshMap();
      });
    });

    addBusinessBtn.onclick = () => openAddEditModal("add");
    fabAddBtn.onclick = () => openAddEditModal("add");
    fabListBtn.onclick = () => {
      document.getElementById("leftPanel").scrollIntoView({ behavior:"smooth" });
    };
    closeDetailBtn.onclick = closeBusinessDetail;

    // optional realtime for beta
    function enableRealtime() {
      sb.channel("businesses-live")
        .on("postgres_changes", {
          event: "*",
          schema: "public",
          table: "businesses"
        }, async () => {
          await loadBusinesses();
        })
        .subscribe();
    }

    // =========================
    // RUN
    // =========================
    boot().then(enableRealtime);
  </script>
</body>
</html>
